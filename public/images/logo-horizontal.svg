    <ellipse cx="40" cy="46" rx="33" ry="30" stroke="#111827" transform="rotate(-40 40 46)"/>
    <ellipse cx="47" cy="43" rx="32" ry="31" stroke="#111827" transform="rotate(-8 47 43)"/>
